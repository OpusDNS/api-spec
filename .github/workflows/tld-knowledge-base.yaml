name: Generate TLD Knowledge Base

# Regenerates the TLD Knowledge Base Markdown pages from the latest compiled
# specs in OpusDNS/tld-specifications and opens a PR with the diff.

on:
  workflow_dispatch:
    inputs:
      tld_specifications_ref:
        description: Branch/tag/SHA of OpusDNS/tld-specifications to use
        required: false
        default: main
  repository_dispatch:
    types: [tld_specifications_updated]
  schedule:
    - cron: "0 5 * * 1"  # weekly safety net (Mondays 05:00 UTC)

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout api-spec
        uses: actions/checkout@v4

      - name: Checkout tld-specifications
        uses: actions/checkout@v4
        with:
          repository: OpusDNS/tld-specifications
          path: tld-specifications
          ref: >-
            ${{ github.event.inputs.tld_specifications_ref
                || github.event.client_payload.ref
                || 'main' }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        working-directory: tld-specifications
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile TLD specifications
        working-directory: tld-specifications
        run: |
          python scripts/compile_tld_specs.py \
            --schema ./specifications/schema.json

      - name: Regenerate TLD knowledge base
        run: |
          python scripts/generate_tld_knowledge_base.py \
            --input tld-specifications/compiled_specifications

      - name: Detect changes
        id: diff
        run: |
          if git diff --quiet --exit-code -- \
              scalar/content/tld-knowledge-base scalar/scalar.config.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          add-paths: |
            scalar/content/tld-knowledge-base/**
            scalar/scalar.config.json
          branch: bot/tld-knowledge-base-sync
          commit-message: "chore(tld-kb): regenerate TLD knowledge base"
          title: "chore(tld-kb): regenerate TLD knowledge base"
          body: |
            Auto-generated by the **Generate TLD Knowledge Base** workflow.

            Source: `OpusDNS/tld-specifications@${{
              github.event.inputs.tld_specifications_ref
                || github.event.client_payload.ref
                || 'main' }}`

            Merging this PR will publish the updated knowledge base via Scalar.
          labels: |
            automated
            tld-knowledge-base
          delete-branch: true
