components:
  schemas:
    AllocationMethodType:
      enum:
      - fcfs
      - auction
      - lottery
      title: AllocationMethodType
      type: string
    AllowedNumberOfNameserverBase:
      properties:
        max:
          description: Maximum number of nameserver per domain name
          title: Max
          type: integer
        min:
          description: Minimum number of nameserver per domain name
          minimum: 0.0
          title: Min
          type: integer
      required:
      - min
      - max
      title: AllowedNumberOfNameserverBase
      type: object
    AttributeCondition:
      properties:
        field:
          $ref: '#/components/schemas/RegistryHandleAttributeType'
          description: The attribute key to evaluate
        operator:
          $ref: '#/components/schemas/ConditionOperator'
          description: The comparison operator
        value:
          anyOf:
          - type: string
          - items:
              type: string
            type: array
          description: The value(s) to compare against
          title: Value
      required:
      - field
      - operator
      - value
      title: AttributeCondition
      type: object
    AttributeType:
      enum:
      - enum
      - string
      - boolean
      - datetime
      - integer
      - country_code
      title: AttributeType
      type: string
    BatchSortField:
      enum:
      - created_on
      - started_at
      - finished_at
      title: BatchSortField
      type: string
    BatchStatus:
      enum:
      - pending
      - complete
      title: BatchStatus
      type: string
    BillingMetadata:
      properties:
        billing_model:
          anyOf:
          - type: string
          - type: 'null'
          description: Payment terms for the organization.
          title: Billing Model
        credit_limit:
          anyOf:
          - type: integer
          - type: 'null'
          description: Credit limit for the organization.
          title: Credit Limit
        customer_number:
          anyOf:
          - type: integer
          - type: 'null'
          description: Customer account number for the organization.
          title: Customer Number
      title: BillingMetadata
      type: object
    BillingPlan:
      properties:
        amount:
          description: Price of the billing plan.
          title: Amount
          type: string
        currency:
          anyOf:
          - $ref: '#/components/schemas/Currency'
          - type: 'null'
          description: Currency of the billing plan.
        name:
          anyOf:
          - type: string
          - type: 'null'
          description: Name of the billing plan.
          title: Name
        plan_id:
          anyOf:
          - type: string
          - type: 'null'
          description: Billing plan ID for the organization.
          title: Plan Id
        plan_level:
          anyOf:
          - type: string
          - type: 'null'
          description: Plan level such as 'basic', 'premium' or 'enterprise'.
          title: Plan Level
        type:
          anyOf:
          - type: string
          - type: 'null'
          description: Plan type or billing interval.
          title: Type
      title: BillingPlan
      type: object
    BillingTransactionAction:
      enum:
      - create
      - transfer
      - renew
      - restore
      - trade
      - application
      - service_fee
      - wallet_top_up
      title: BillingTransactionAction
      type: string
    BillingTransactionProductType:
      enum:
      - domain
      - zones
      - email_forward
      - domain_forward
      - account_wallet
      title: BillingTransactionProductType
      type: string
    BillingTransactionResponse:
      properties:
        action:
          $ref: '#/components/schemas/BillingTransactionAction'
          description: The action performed in the transaction
        amount:
          description: The amount of the transaction including VAT
          pattern: ^(?!^[-+.]*$)[+-]?0*(?:\d{0,8}|(?=[\d.]{1,11}0*$)\d{0,8}\.\d{0,2}0*$)
          title: Amount
          type: string
        billing_transaction_id:
          examples:
          - billing_transaction_01h45ytscbebyvny4gc8cr8ma2
          format: typeid
          pattern: ^billing_transaction_[0-7][0-9a-hjkmnpq-tv-z]{25}$
          title: Billing Transaction Id
          type: string
          x-typeid-prefix: billing_transaction
        completed_on:
          anyOf:
          - format: date-time
            type: string
          - type: 'null'
          description: The date/time the transaction completed
          title: Completed On
        created_on:
          description: The date/time the transaction was created
          format: date-time
          title: Created On
          type: string
        currency:
          $ref: '#/components/schemas/Currency'
          description: The currency of the transaction
        price:
          description: The price of the product without sales tax
          pattern: ^(?!^[-+.]*$)[+-]?0*(?:\d{0,8}|(?=[\d.]{1,11}0*$)\d{0,8}\.\d{0,2}0*$)
          title: Price
          type: string
        product_reference:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          description: The reference of the product
          title: Product Reference
        product_type:
          $ref: '#/components/schemas/BillingTransactionProductType'
          description: The type of product
        status:
          $ref: '#/components/schemas/BillingTransactionStatus'
          default: pending
          description: The status of the transaction
        tax_amount:
          description: The tax amount of the transaction
          pattern: ^(?!^[-+.]*$)[+-]?0*(?:\d{0,8}|(?=[\d.]{1,11}0*$)\d{0,8}\.\d{0,2}0*$)
          title: Tax Amount
          type: string
        tax_rate:
          description: The tax rate of the transaction
          pattern: ^(?!^[-+.]*$)[+-]?0*(?:\d{0,8}|(?=[\d.]{1,11}0*$)\d{0,8}\.\d{0,2}0*$)
          title: Tax Rate
          type: string
        updated_on:
          description: The date/time the transaction was updated
          format: date-time
          title: Updated On
          type: string
      required:
      - product_type
      - product_reference
      - action
      - amount
      - price
      - tax_rate
      - tax_amount
      title: BillingTransactionResponse
      type: object
    BillingTransactionSortField:
      enum:
      - product_type
      - action
      - status
      - created_on
      - completed_on
      title: BillingTransactionSortField
      type: string
    BillingTransactionStatus:
      enum:
      - pending
      - succeeded
      - failed
      - canceled
      title: BillingTransactionStatus
      type: string
    BrowserStatsBucket:
      properties:
        key:
          title: Key
          type: string
        total:
          title: Total
          type: integer
        unique:
          title: Unique
          type: integer
      required:
      - key
      - total
      - unique
      title: BrowserStatsBucket
      type: object
    BulkObjectTagChanges:
      properties:
        add:
          description: Tag IDs to add to the objects.
          items:
            examples:
            - tag_01h45ytscbebyvny4gc8cr8ma2
            format: typeid
            pattern: ^tag_[0-7][0-9a-hjkmnpq-tv-z]{25}$
            type: string
            x-typeid-prefix: tag
          maxItems: 1000
          title: Add
          type: array
        objects:
          description: Object references to operate on. TypeIDs and resource names
            may be mixed.
          items:
            description: A TypeID (e.g. domain_01h45ytscbebyvny4gc8cr8ma2) or a resource
              name (e.g. example.com)
            examples:
            - domain_01h45ytscbebyvny4gc8cr8ma2
            - example.com
            type: string
          maxItems: 1000
          minItems: 1
          title: Objects
          type: array
        remove:
          description: Tag IDs to remove from the objects.
          items:
            examples:
            - tag_01h45ytscbebyvny4gc8cr8ma2
            format: typeid
            pattern: ^tag_[0-7][0-9a-hjkmnpq-tv-z]{25}$
            type: string
            x-typeid-prefix: tag
          maxItems: 1000
          title: Remove
          type: array
        replace:
          anyOf:
          - items:
              examples:
              - tag_01h45ytscbebyvny4gc8cr8ma2
              format: typeid
              pattern: ^tag_[0-7][0-9a-hjkmnpq-tv-z]{25}$
              type: string
              x-typeid-prefix: tag
            maxItems: 1000
            type: array
          - type: 'null'
          description: Tag IDs to set as the complete tag set for the objects, replacing
            any existing tags. Mutually exclusive with 'add' and 'remove'. An empty
            list removes all tags.
          title: Replace
        type:
          $ref: '#/components/schemas/TagType'
          description: The object/tag type (e.g. DOMAIN, CONTACT, ZONE)
      required:
      - type
      - objects
      title: BulkObjectTagChanges
      type: object
    CommandError:
      properties:
        error:
          description: Error message
          title: Error
          type: string
        index:
          description: Index of the failed command in the request
          title: Index
          type: integer
      required:
      - index
      - error
      title: CommandError
      type: object
    ComplianceStatus:
      enum:
      - preparing
      - pending
      - approved
      - disapproved
      - expired
      title: ComplianceStatus
      type: string
    ConditionOperator:
      enum:
      - equals
      - not_equals
      - in
      - not_in
      title: ConditionOperator
      type: string
    ContactAttributeDefinition:
      description: Definition of a possible attribute for a TLD.
      properties:
        conditions:
          anyOf:
          - items:
              $ref: '#/components/schemas/AttributeCondition'
            type: array
          - type: 'null'
          description: Conditions that must ALL be true for this attribute to be active.
            None means always active.
          title: Conditions
        contact_roles:
          anyOf:
          - items:
              $ref: '#/components/schemas/DomainContactType'
            type: array
          - type: 'null'
          description: Contact roles this attribute applies to. None means all roles.
          title: Contact Roles
        key:
          $ref: '#/components/schemas/RegistryHandleAttributeType'
          description: Unique identifier for the attribute
        required:
          default: false
          description: Whether this attribute is required when its conditions are
            met
          title: Required
          type: boolean
        type:
          $ref: '#/components/schemas/AttributeType'
          description: Type of the attribute (e.g., 'enum', 'string', 'boolean')
        values:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          description: Allowed values for enum types
          title: Values
      required:
      - key
      - type
      title: ContactAttributeDefinition
      type: object
    ContactAttributeLinkDetail:
      properties:
        attributes:
          additionalProperties:
            type: string
          description: The attributes from the linked set
          propertyNames:
            $ref: '#/components/schemas/RegistryHandleAttributeType'
          title: Attributes
          type: object
        contact_attribute_set_id:
          description: The attribute set linked to the contact
          examples:
          - contact_attribute_set_01h45ytscbebyvny4gc8cr8ma2
          format: typeid
          pattern: ^contact_attribute_set_[0-7][0-9a-hjkmnpq-tv-z]{25}$
          title: Contact Attribute Set Id
          type: string
          x-typeid-prefix: contact_attribute_set
        label:
          description: The label of the linked attribute set
          title: Label
          type: string
        tld:
          description: The TLD this link applies to
          title: Tld
          type: string
      required:
      - contact_attribute_set_id
      - label
      - tld
      - attributes
      title: ContactAttributeLinkDetail
      type: object
    ContactAttributeLinkResponse:
      properties:
        contact_attribute_link_id:
          description: The unique identifier of the link
          examples:
          - contact_attribute_link_01h45ytscbebyvny4gc8cr8ma2
          format: typeid
          pattern: ^contact_attribute_link_[0-7][0-9a-hjkmnpq-tv-z]{25}$
          title: Contact Attribute Link Id
          type: string
          x-typeid-prefix: contact_attribute_link
        contact_attribute_set_id:
          description: The attribute set linked to the contact
          examples:
          - contact_attribute_set_01h45ytscbebyvny4gc8cr8ma2
          format: typeid
          pattern: ^contact_attribute_set_[0-7][0-9a-hjkmnpq-tv-z]{25}$
          title: Contact Attribute Set Id
          type: string
          x-typeid-prefix: contact_attribute_set
        contact_id:
          description: The contact this link belongs to
          examples:
          - contact_01h45ytscbebyvny4gc8cr8ma2
          format: typeid
          pattern: ^contact_[0-7][0-9a-hjkmnpq-tv-z]{25}$
          title: Contact Id
          type: string
          x-typeid-prefix: contact
        created_on:
          description: The date/time the entry was created on
          format: date-time
          title: Created On
          type: string
        tld:
          description: The TLD this link applies to
          title: Tld
          type: string
      required:
      - contact_attribute_link_id
      - contact_id
      - contact_attribute_set_id
      - tld
      - created_on
      title: ContactAttributeLinkResponse
      type: object
    ContactAttributeSetCreate:
      properties:
        attributes:
          additionalProperties:
            type: string
          description: Key-value map of contact attributes for this set
          propertyNames:
            $ref: '#/components/schemas/RegistryHandleAttributeType'
          title: Attributes
          type: object
        label:
          description: A human-readable label explaining the purpose of this attribute
            set
          maxLength: 255
          minLength: 1
          title: Label
          type: string
        tld:
          description: The TLD this attribute set applies to (e.g. 'de', '.de', 'DE')
          title: Tld
          type: string
      required:
      - label
      - attributes
      - tld
      title: ContactAttributeSetCreate
      type: object
    ContactAttributeSetResponse:
      properties:
        attributes:
          additionalProperties:
            type: string
          description: Key-value map of contact attributes for this set
          propertyNames:
            $ref: '#/components/schemas/RegistryHandleAttributeType'
          title: Attributes
          type: object
        contact_attribute_set_id:
          description: The unique identifier of the attribute set
          examples:
          - contact_attribute_set_01h45ytscbebyvny4gc8cr8ma2
          format: typeid
          pattern: ^contact_attribute_set_[0-7][0-9a-hjkmnpq-tv-z]{25}$
          title: Contact Attribute Set Id
          type: string
          x-typeid-prefix: contact_attribute_set
        created_on:
          description: The date/time the entry was created on
          format: date-time
          title: Created On
          type: string
        label:
          description: A human-readable label explaining the purpose of this attribute
            set
          maxLength: 255
          minLength: 1
          title: Label
          type: string
        linked_contacts:
          default: 0
          description: Number of contacts linked to this attribute set
          title: Linked Contacts
          type: integer
        organization_id:
          description: The organization that owns this attribute set
          examples:
          - organization_01h45ytscbebyvny4gc8cr8ma2
          format: typeid
          pattern: ^organization_[0-7][0-9a-hjkmnpq-tv-z]{25}$
          title: Organization Id
          type: string
          x-typeid-prefix: organization
        tld:
          description: The TLD this attribute set applies to
          title: Tld
          type: string
        updated_on:
          description: The date/time the entry was last updated on
          format: date-time
          title: Updated On
          type: string
      required:
      - label
      - attributes
      - contact_attribute_set_id
      - organization_id
      - tld
      - created_on
      - updated_on
      title: ContactAttributeSetResponse
      type: object
    ContactAttributeSetSortField:
      enum:
      - label
      - tld
      - created_on
      - updated_on
      title: ContactAttributeSetSortField
      type: string
    ContactAttributeSetUpdate:
      properties:
        label:
          anyOf:
          - maxLength: 255
            minLength: 1
            type: string
          - type: 'null'
          description: A human-readable label explaining the purpose of this attribute
            set
          title: Label
      title: ContactAttributeSetUpdate
      type: object
    ContactConfigBase:
      properties:
        max:
          description: Maximum contacts per domain name
          minimum: 0.0
          title: Max
          type: integer
        min:
          description: Minimum contacts per domain name
          minimum: 0.0
          title: Min
          type: integer
        type:
          $ref: '#/components/schemas/DomainContactType'
          description: The type of contact
      required:
      - type
      - min
      - max
      title: ContactConfigBase
      type: object
    ContactCreate:
      properties:
        city:
          description: The city of the contact
          minLength: 1
          title: City
          type: string
        country:
          description: The country of the contact
          pattern: ^\w{2}$
          title: Country
          type: string
        disclose:
          description: Whether the contact details should be disclosed. The Disclose
            function may not work with all TLDs. Some registries still display the
            data in Whois if, for example, the organization field is filled in.
          title: Disclose
          type: boolean
        email:
          description: The email of the contact
          format: email
          title: Email
          type: string
        fax:
          anyOf:
          - format: phone
            type: string
          - type: 'null'
          description: The contacts's fax number
          title: Fax
        first_name:
          description: The first name of the contact
          minLength: 1
          title: First Name
          type: string
        last_name:
          description: The last name of the contact
          minLength: 1
          title: Last Name
          type: string
        org:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          description: The organization of the contact
          title: Org
        phone:
          description: The contact's phone number
          examples:
          - '+1.2125552368'
          format: phone
          title: Phone
          type: string
        postal_code:
          description: The postal code of the contact
          minLength: 1
          title: Postal Code
          type: string
        state:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          description: The state of the contact
          title: State
        street:
          description: The address of the contact
          minLength: 1
          title: Street
          type: string
        title:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          description: The title of the contact
          title: Title
      required:
      - first_name
      - last_name
      - email
      - phone
      - street
      - city
      - postal_code
      - country
      - disclose
      title: ContactCreate
      type: object
    ContactCreateBulkCommand:
      properties:
        command:
          const: contact_create_bulk
          default: contact_create_bulk
          title: Command
          type: string
        idempotency_key:
          anyOf:
          - type: string
          - type: 'null'
          description: Idempotency key for this bulk command
          title: Idempotency Key
        payload:
          $ref: '#/components/schemas/ContactCreateBulkPayload'
          description: Bulk contact creation payload
        version:
          default: v1
          description: Command version
          title: Version
          type: string
      required:
      - payload
      title: ContactCreateBulkCommand
      type: object
    ContactCreateBulkInstance:
      properties:
        city:
          description: City
          minLength: 1
          title: City
          type: string
        country:
          anyOf:
          - pattern: ^\w{2}$
            type: string
          - type: 'null'
          description: Override country for this contact
          title: Country
        disclose:
          anyOf:
          - type: boolean
          - type: 'null'
          description: Override disclose setting for this contact
          title: Disclose
        email:
          description: Email address of the contact
          format: email
          title: Email
          type: string
        fax:
          anyOf:
          - format: phone
            type: string
          - type: 'null'
          description: Fax number in international format
          title: Fax
        first_name:
          description: First name of the contact
          minLength: 1
          title: First Name
          type: string
        last_name:
          description: Last name of the contact
          minLength: 1
          title: Last Name
          type: string
        org:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          description: Override organization for this contact
          title: Org
        phone:
          description: Phone number in international format
          format: phone
          title: Phone
          type: string
        postal_code:
          description: Postal code
          minLength: 1
          title: Postal Code
          type: string
        state:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          description: Override state for this contact
          title: State
        street:
          description: Street address
          minLength: 1
          title: Street
          type: string
        title:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          description: Override title for this contact
          title: Title
      required:
      - first_name
      - last_name
      - email
      - phone
      - street
      - city
      - postal_code
      title: ContactCreateBulkInstance
      type: object
    ContactCreateBulkPayload:
      properties:
        instances:
          description: List of contacts to create (1-1000)
          items:
            $ref: '#/components/schemas/ContactCreateBulkInstance'
          maxItems: 1000
          minItems: 1
          title: Instances
          type: array
        template:
          $ref: '#/components/schemas/ContactCreateBulkTemplate'
          description: Shared settings for all contacts
      required:
      - template
      - instances
      title: ContactCreateBulkPayload
      type: object
    ContactCreateBulkTemplate:
      properties:
        country:
          description: The country of the contacts
          pattern: ^\w{2}$
          title: Country
          type: string
        disclose:
          description: Whether contact details should be disclosed in WHOIS
          title: Disclose
          type: boolean
        org:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          description: Organization name
          title: Org
        state:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          description: State/province
          title: State
        title:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          description: Contact title
          title: Title
      required:
      - country
      - disclose
      title: ContactCreateBulkTemplate
      type: object
    ContactCreateCommand:
      properties:
        command:
          const: contact_create
          default: contact_create
          title: Command
          type: string
        idempotency_key:
          anyOf:
          - type: string
          - type: 'null'
          description: Idempotency key for this command
          title: Idempotency Key
        payload:
          $ref: '#/components/schemas/ContactCreatePayloadData'
          description: Contact creation payload
        version:
          default: v1
          description: Command version
          title: Version
          type: string
      required:
      - payload
      title: ContactCreateCommand
      type: object
    ContactCreatePayloadData:
      properties:
        city:
          description: The city of the contact
          minLength: 1
          title: City
          type: string
        country:
          description: The country of the contact
          pattern: ^\w{2}$
          title: Country
          type: string
        disclose:
          description: Whether the contact details should be disclosed. The Disclose
            function may not work with all TLDs. Some registries still display the
            data in Whois if, for example, the organization field is filled in.
          title: Disclose
          type: boolean
        email:
          description: The email of the contact
          format: email
          title: Email
          type: string
        fax:
          anyOf:
          - format: phone
            type: string
          - type: 'null'
          description: The contacts's fax number
          title: Fax
        first_name:
          description: The first name of the contact
          minLength: 1
          title: First Name
          type: string
        last_name:
          description: The last name of the contact
          minLength: 1
          title: Last Name
          type: string
        org:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          description: The organization of the contact
          title: Org
        phone:
          description: The contact's phone number
          examples:
          - '+1.2125552368'
          format: phone
          title: Phone
          type: string
        postal_code:
          description: The postal code of the contact
          minLength: 1
          title: Postal Code
          type: string
        state:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          description: The state of the contact
          title: State
        street:
          description: The address of the contact
          minLength: 1
          title: Street
          type: string
        title:
          anyOf:
          - minLength: 1
            type: string
          - type: 'null'
          description: The title of the contact
          title: Title
      required:
      - first_name
      - last_name
      - email
      - phone
      - street
      - city
      - postal_code
      - country
      - disclose
      title: ContactCreatePayloadData
      type: object
    ContactCreateWorkerPayload:
      properties:
        contact:
          $ref: '#/components/schemas/ContactCreatePayloadData'
        operation:
          title: Operation
          type: string
        type:
          enum:
          - contact_create
          - contact_create_bulk
          title: Type
          type: string
      required:
      - type
      - operation
      - contact
      title: ContactCreateWorkerPayload
      type: object
    ContactHandle:
      properties:
        attributes:
          anyOf:
          - additionalProperties:
              type: string
