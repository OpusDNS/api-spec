          anyOf:
          - examples:
            - P5D
            - P1Y
            pattern: ^\-?P?(\d+Y)?(\d+M)?(\d+D)?T?(\d+H)?(\d+M)?(\d+S)?$
            type: string
          - type: 'null'
          description: Grace period after expiration in ISO 8601 format (e.g., 5D,
            -7D)
          examples:
